<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreMMC | Premium Hosting</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #050816; color: white; overflow-x: hidden; }
        
        /* Animated BG */
        .bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; opacity: 0.4; filter: blur(5px); }
        
        /* Navbar */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 5%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 1.5rem; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 10px; }
        .logo span { color: #facc15; }
        .nav-links { display: flex; list-style: none; gap: 20px; align-items: center; }
        .nav-links a { color: #ccc; text-decoration: none; font-size: 0.9rem; transition: 0.3s; cursor: pointer; }
        .nav-links a:hover { color: #fff; }

        /* Dropdown Logic */
        .dropdown { position: relative; }
        .dropdown-menu { display: none; position: absolute; top: 100%; left: 0; background: #111827; min-width: 180px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); margin-top: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .dropdown:hover .dropdown-menu { display: block; }
        .dropdown-menu a { display: block; padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .dropdown-menu a:last-child { border: none; }

        /* Hero Section */
        .hero { padding: 120px 20px 40px; text-align: center; }
        .badge { background: rgba(59, 130, 246, 0.2); color: #60a5fa; padding: 5px 15px; border-radius: 20px; font-size: 0.7rem; letter-spacing: 1px; display: inline-block; margin-bottom: 20px; border: 1px solid #3b82f6; }
        h1 { font-size: 3rem; margin-bottom: 15px; }
        h1 span { color: #3b82f6; transition: 0.3s; }
        .hero p { color: #9ca3af; max-width: 600px; margin: 0 auto 30px; }

        /* CPU Toggle */
        .toggle-container { display: flex; justify-content: center; margin-bottom: 50px; }
        .toggle-box { background: rgba(255,255,255,0.05); padding: 5px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); display: flex; gap: 5px; }
        .toggle-btn { padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: 600; color: #9ca3af; display: flex; align-items: center; gap: 8px; }
        .toggle-btn.active.intel { background: #3b82f6; color: white; }
        .toggle-btn.active.amd { background: #ef4444; color: white; }

        /* Plans Grid */
        .plans-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        .card { background: rgba(17, 24, 39, 0.7); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 25px; transition: 0.3s; position: relative; overflow: hidden; }
        .card:hover { border-color: #3b82f6; transform: translateY(-5px); }
        
        .plan-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .plan-name { font-size: 1.5rem; font-weight: 700; }
        .plan-price { font-size: 1.8rem; font-weight: 800; color: #fff; }
        .plan-price span { font-size: 0.8rem; color: #9ca3af; }

        .specs { list-style: none; margin-bottom: 25px; }
        .specs li { font-size: 0.85rem; color: #d1d5db; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .specs li i { color: #3b82f6; width: 16px; }

        .btn-deploy { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #3b82f6; color: white; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-deploy:hover { filter: brightness(1.2); }

        /* AMD Theme Adjustments */
        body.amd-mode h1 span { color: #ef4444; }
        body.amd-mode .btn-deploy { background: #ef4444; }
        body.amd-mode .specs li i { color: #ef4444; }
        body.amd-mode .card:hover { border-color: #ef4444; }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .nav-links { display: none; } /* Mobile menu can be added later */
        }
    </style>
</head>
<body id="body">

    <img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExN2x4Znl3aWk5OXUwaHdhOHZ3NzQyNzZreXphcXdnd2s2NTd1dXYzcSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/8hNRGVIW1ljowZVz0S/giphy.gif" class="bg-video">

    <nav>
        <div class="logo"><span>⚡</span> CoreMMC</div>
        <ul class="nav-links">
            <li><a href="#">Features</a></li>
            <li class="dropdown">
                <a>Hosting <i class="fas fa-chevron-down" style="font-size: 10px;"></i></a>
                <div class="dropdown-menu">
                    <a href="https://supergmt95.github.io/minecraft-hosting/">🎮 Minecraft Hosting</a>
                    <a href="#">🌐 Web Hosting</a>
                    <a href="#">🖥️ VPS Hosting</a>
                </div>
            </li>
            <li class="dropdown">
                <a>Panels <i class="fas fa-chevron-down" style="font-size: 10px;"></i></a>
                <div class="dropdown-menu">
                    <a href="https://supergmt95.github.io/minecraft-hosting/">🏠 Home Panel</a>
                    <a href="https://supergmt95.github.io/Game-Panel/">🕹️ Hosting Panel</a>
                    <a href="#">💳 Billing Panel</a>
                    <a href="https://discord.gg/SvQSv5E53">🎧 Contact Support</a>
                </div>
            </li>
            <li><a href="https://discord.gg/SvQSv5E53">Status</a></li>
            <li><a href="https://supergmt95.github.io/Game-Panel/" style="background: #3b82f6; padding: 8px 15px; border-radius: 6px; color: white;">Get Started</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="badge" id="cpu-badge">INTEL XEON POWERED</div>
        <h1 id="main-title">Minecraft Server <span>Hosting</span></h1>
        
        <div class="toggle-container">
            <div class="toggle-box">
                <div id="intelBtn" class="toggle-btn active intel" onclick="toggleCPU('intel')">
                    <i class="fas fa-microchip"></i> Intel Xeon
                </div>
                <div id="amdBtn" class="toggle-btn" onclick="toggleCPU('amd')">
                    <i class="fas fa-fire"></i> AMD Eypc
                </div>
            </div>
        </div>

        <div class="plans-grid" id="plans-container">
            </div>
    </section>

    <script>
        const planData = [
            { name: 'Cow', ram: '2GB', cpu: '200%', ssd: '30GB', intelPrice: '25', amdPrice: '35', ports: '2' },
            { name: 'Pig', ram: '4GB', cpu: '400%', ssd: '50GB', intelPrice: '45', amdPrice: '65', ports: '3' },
            { name: 'Sheep', ram: '6GB', cpu: '600%', ssd: '60GB', intelPrice: '75', amdPrice: '95', ports: '4' },
            { name: 'Slime', ram: '8GB', cpu: '800%', ssd: '80GB', intelPrice: '110', amdPrice: '140', ports: '5' },
            { name: 'Villager', ram: '12GB', cpu: '1200%', ssd: '100GB', intelPrice: '160', amdPrice: '190', ports: '6' },
            { name: 'Chicken', ram: '16GB', cpu: '1600%', ssd: '150GB', intelPrice: '220', amdPrice: '260', ports: '8' }
        ];

        function renderPlans(type) {
            const container = document.getElementById('plans-container');
            container.innerHTML = '';
            
            planData.forEach(plan => {
                const price = type === 'intel' ? plan.intelPrice : plan.amdPrice;
                const card = `
                    <div class="card">
                        <div class="plan-header">
                            <div class="plan-name">${plan.name}</div>
                            <div class="plan-price">₹${price}<span>/mo</span></div>
                        </div>
                        <ul class="specs">
                            <li><i class="fas fa-memory"></i> ${plan.ram} DDR4 RAM</li>
                            <li><i class="fas fa-microchip"></i> ${plan.cpu} CPU Speed</li>
                            <li><i class="fas fa-hdd"></i> ${plan.ssd} NVMe SSD</li>
                            <li><i class="fas fa-network-wired"></i> ${plan.ports} Dedicated Ports</li>
                            <li><i class="fas fa-shield-halved"></i> DDoS Protection</li>
                            ${plan.name === 'Villager' || plan.name === 'Chicken' ? '<li><i class="fas fa-headset"></i> Priority Support</li>' : ''}
                        </ul>
                        <button class="btn-deploy" onclick="window.location.href='https://supergmt95.github.io/Game-Panel/'">Deploy Server</button>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        function toggleCPU(type) {
            const body = document.getElementById('body');
            const intelBtn = document.getElementById('intelBtn');
            const amdBtn = document.getElementById('amdBtn');
            const badge = document.getElementById('cpu-badge');
            const title = document.getElementById('main-title');

            if(type === 'amd') {
                body.classList.add('amd-mode');
                amdBtn.classList.add('active', 'amd');
                intelBtn.classList.remove('active', 'intel');
                badge.innerText = 'AMD EYPC PERFORMANCE';
                title.innerHTML = 'Minecraft <span>AMD Hosting</span>';
                renderPlans('amd');
            } else {
                body.classList.remove('amd-mode');
                intelBtn.classList.add('active', 'intel');
                amdBtn.classList.remove('active', 'amd');
                badge.innerText = 'INTEL XEON POWERED';
                title.innerHTML = 'Minecraft Server <span>Hosting</span>';
                renderPlans('intel');
            }
        }

        // Initial Load
        renderPlans('intel');
    </script>
</body>
</html>
